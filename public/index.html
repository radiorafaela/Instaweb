<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latest Reels | Instagram Widget</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #833ab4;
            --gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            --dark-bg: #0a0a0a;
            --card-radius: 12px;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body {
            margin: 0;
            padding: 40px 20px;
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            margin-bottom: 40px;
            text-align: center;
        }

        .header h1 {
            font-weight: 600;
            font-size: 2.5rem;
            margin: 0;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #888;
            margin-top: 10px;
        }

        #reels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        #reels-grid.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .reel-card {
            position: relative;
            border-radius: var(--card-radius);
            overflow: hidden;
            aspect-ratio: 9/16;
            background: #1a1a1a;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-decoration: none;
            transition: var(--transition);
        }

        .reel-card:hover {
            transform: scale(1.03);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
        }

        .reel-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .reel-card:hover img {
            filter: brightness(0.6);
        }

        .reel-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
            opacity: 0;
            transform: translateY(20px);
            transition: var(--transition);
        }

        .reel-card:hover .reel-overlay {
            opacity: 1;
            transform: translateY(0);
        }

        .reel-caption {
            font-size: 0.9rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: #eee;
        }

        .reel-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 100px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .error-message {
            color: #ff4d4d;
            background: rgba(255, 77, 77, 0.1);
            padding: 15px 30px;
            border-radius: 30px;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            #reels-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            body {
                padding: 20px 10px;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Latest Reels</h1>
        <p>Curated content from @radiorafaela</p>
    </div>

    <div id="loader" class="loading-spinner"></div>
    <div id="reels-grid"></div>

    <script>
        async function fetchReels() {
            const grid = document.getElementById('reels-grid');
            const loader = document.getElementById('loader');

            try {
                // Fetch from the API (which maps to /data/reels.json via rewrite)
                const response = await fetch('/data/reels.json');

                if (!response.ok) throw new Error('Could not load reels.');

                const reels = await response.json();

                if (reels.length === 0) {
                    grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #666;">No reels found.</p>';
                } else {
                    grid.innerHTML = reels.map(reel => `
                        <a href="${reel.link}" target="_blank" class="reel-card">
                            <div class="reel-badge">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
                                Reel
                            </div>
                            <img src="${reel.thumbnail}" alt="Reel thumbnail" loading="lazy">
                            <div class="reel-overlay">
                                <div class="reel-caption">${reel.caption}</div>
                            </div>
                        </a>
                    `).join('');
                }

                loader.style.display = 'none';
                grid.classList.add('visible');

            } catch (error) {
                console.error(error);
                loader.style.display = 'none';
                document.body.insertAdjacentHTML('beforeend', '<div class="error-message">Oops! We couldn\'t load the reels at this moment.</div>');
            }
        }

        // Initialize
        window.addEventListener('load', fetchReels);
    </script>
</body>

</html>
